services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lpa
      POSTGRES_PASSWORD: lpa_dev_password
      POSTGRES_DB: lpa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lpa -d lpa"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://lpa:lpa_dev_password@db:5432/lpa
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pgdata:
